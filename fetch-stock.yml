name: Fetch Taiwan Stock Radar Data

on:
  schedule:
    # Taiwan time 17:17 = UTC 09:17
    - cron: "17 9 * * 1-5"
    # Taiwan time 17:47 = UTC 09:47, retry before 18:00 target when platform is not delayed
    - cron: "47 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-radar-fetch
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Taiwan stock data
        run: node fetch-stock.mjs

      - name: Commit updated stock data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screening.json latest.json history-prices.json history-revenue.json history-financials.json history-chip.json meta.json
          git diff --cached --quiet || git commit -m "chore: update stock radar data"
          git push
