name: Fetch Taiwan Stock Radar Data

on:
  schedule:
    - cron: "17 17 * * 1-5"
      timezone: "Asia/Taipei"
    - cron: "47 17 * * 1-5"
      timezone: "Asia/Taipei"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-radar-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript syntax
        run: npm run check

      - name: Fetch and build stock radar data
        run: npm run fetch

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screening.json latest.json history-prices.json meta.json
          git diff --cached --quiet || git commit -m "chore: update stock radar data"
          git push
